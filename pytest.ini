[pytest]
testpaths = tests
pythonpath = . sort
addopts =
    --html=reports/test_report.html
    --self-contained-html
    --cov=ball_tracking_analysis
    --cov=ball_tracking_fast
    --cov=prediction_pipeline
    --cov=prediction_model_base
    --cov=broadcast_utils
    --cov=xgb_win_predictor
    --cov=late_fusion_win_predictor
    --cov-report=html:reports/coverage
    --cov-report=term-missing
    -v
